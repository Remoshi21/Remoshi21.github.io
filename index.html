<!DOCTYPE html>
<html lang="en">
    <head>
        <Title>Whimsical Exif Editor</Title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>Bring whimsical wonder to your world...</h1>
        <h1>Whimsical Exif Editor!</h1>
        <div>
            <button id="upload">Upload Image</button>
            <img id="preview" style="max-width: 300px; display:none; margin-top:20px;">
            <input type="file" id="fileInput" accept="image/*" style="display:none;">
            <script src="upload_image.js"></script>
        </div>
        <p>
            Make your dreamworld a reality by editing the metadata of any photo you choose! Upload a photo, and change the location information to say whatever your heart desires.
        </p>
    </body>
</html>
